# Cloudflare Pages configuration
name = "geomaître-pdf-atelier"
compatibility_date = "2024-01-01"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.preview]
vars = { ENVIRONMENT = "preview" }

# Build configuration for Cloudflare Pages
[build]
command = "npm run build"
cwd = "."
watch_dirs = ["src"]

[build.environment]
NODE_VERSION = "20"
